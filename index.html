<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网安日报速递 - AI城</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .loading-spinner {
            text-align: center;
            padding: 60px 40px;
            color: var(--ink-dark);
            font-style: italic;
            font-size: 1.2em;
        }
        .loading-spinner::after {
            content: '';
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: var(--accent-red);
            font-size: 1.1em;
        }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: var(--ink-dark);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="newspaper">
        <!-- Hero -->
        <div class="index-hero">
            <div class="newspaper-subtitle">AI城 · 网络安全</div>
            <a id="latest-link" href="#" style="color:inherit;text-decoration:none;">
                <h1 class="newspaper-title">网安日报速递</h1>
            </a>
            <div class="newspaper-subtitle">CYBERSECURITY DAILY EXPRESS</div>
            <p>每日精选全球网络安全动态，覆盖 CVE 漏洞、安全事件、威胁情报与执法行动</p>
        </div>

        <!-- Latest Edition Banner (dynamically filled) -->
        <div id="latest-banner" class="keywords-banner" style="display:none;">
            <strong>最新一期：</strong><span id="latest-text"></span>
        </div>

        <!-- Archive -->
        <h3 class="section-header" style="margin:30px 40px 20px;">历史存档</h3>
        <div id="archive-grid" class="archive-grid">
            <div class="loading-spinner">加载中</div>
        </div>

        <!-- Footer -->
        <footer class="newspaper-footer">
            <div class="footer-logo">AI城 · 网安日报</div>
            <p class="footer-disclaimer">
                每日精选 · 值得关注 | 由 AI城 自动化工作流生成
                <br>
                本站内容基于公开信息整理，CVE编号及CVSS评分以官方源为准
            </p>
        </footer>
    </div>

    <script>
    (function() {
        // 日期格式化：2026-06-04 -> 2026年6月4日
        function formatDateCN(dateStr) {
            const parts = dateStr.split('-');
            return parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
        }

        // 获取星期
        function getWeekday(dateStr) {
            const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const d = new Date(dateStr + 'T00:00:00');
            return weekdays[d.getDay()];
        }

        // 生成单张存档卡片
        function createCard(item, isLatest) {
            const card = document.createElement('a');
            card.href = 'daily/' + item.date + '.html';
            card.className = 'archive-card' + (isLatest ? ' latest' : '');
            card.innerHTML = (isLatest ? '<span class="card-tag">LATEST</span>' : '') +
                '<div class="card-date">' + formatDateCN(item.date) + ' ' + (item.weekday || getWeekday(item.date)) + '</div>' +
                '<div class="card-keywords">' + (item.keywords || '') + '</div>';
            return card;
        }

        // 主加载逻辑
        fetch('daily/index.json')
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                const grid = document.getElementById('archive-grid');
                const banner = document.getElementById('latest-banner');
                const bannerText = document.getElementById('latest-text');
                const latestLink = document.getElementById('latest-link');

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">暂无存档</div>';
                    return;
                }

                // 按日期降序排列
                data.sort(function(a, b) { return b.date.localeCompare(a.date); });

                // 更新最新一期横幅
                const latest = data[0];
                bannerText.textContent = formatDateCN(latest.date) + ' — ' + (latest.keywords || '');
                banner.style.display = 'block';
                latestLink.href = 'daily/' + latest.date + '.html';

                // 渲染卡片
                grid.innerHTML = '';
                data.forEach(function(item, i) {
                    grid.appendChild(createCard(item, i === 0));
                });
            })
            .catch(function(err) {
                document.getElementById('archive-grid').innerHTML =
                    '<div class="error-msg">加载失败: ' + err.message + '<br>请确认 daily/index.json 文件存在</div>';
            });
    })();
    </script>
</body>
</html>
